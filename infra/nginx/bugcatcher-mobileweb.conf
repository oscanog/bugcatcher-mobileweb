server {
    listen 80;
    listen [::]:80;
    server_name m.bugcatcher.online mobile.bugcatcher.online;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name m.bugcatcher.online mobile.bugcatcher.online;

    root /var/www/bugcatcher-mobileweb/dist;
    index index.html;

    location ^~ /api/v1/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/bugcatcher/api/v1/index.php;
        fastcgi_param SCRIPT_NAME /api/v1/index.php;
        fastcgi_param PATH_INFO "";
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    ssl_certificate /etc/letsencrypt/live/bugcatcher-mobileweb/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bugcatcher-mobileweb/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
